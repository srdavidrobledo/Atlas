name: atlas
description: Tu entrenador digital inteligente.
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase (configurado, no conectado aún)
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  google_sign_in: ^6.2.1

  # Estado
  flutter_riverpod: ^2.5.1

  # Navegación
  go_router: ^14.2.7

  # Persistencia local
  hive_flutter: ^1.1.0

  # Gráficos
  fl_chart: ^0.68.0

  # Animaciones
  flutter_animate: ^4.5.0

  # Utilidades
  intl: ^0.19.0
  uuid: ^4.4.2
  equatable: ^2.0.5
  dartz: ^0.10.1

  # Imagen
  image_picker: ^1.1.2

  # Importación de archivos
  file_picker: ^8.1.2
  syncfusion_flutter_pdf: ^26.2.4

  # OCR (mobile-first: Android + iOS)
  google_mlkit_text_recognition: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
